{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">  <!-- data-bs-theme for Bootstrap 5 dark mode -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jagadeesan M - Full Stack & IoT Developer{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- AOS for fade-in animations (optional but professional) -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-body text-body">

    <!-- Navbar with Dark Mode Toggle -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="{% url 'index' %}">
                <i class="fas fa-code me-2"></i>JAGADEESAN's PORTFOLIO
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'index' %}" 
                        style="color:#fd0d0d; background-color:white; padding:4px 10px; border-radius:5px; margin-right:40px;">
                        <strong>About</strong>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'projects' %}" 
                        style="color:#fd0d0d; background-color:white; padding:4px 10px; border-radius:5px; margin-right:40px;">
                        <strong>Projects</strong>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'experience' %}" 
                        style="color:#fd0d0d; background-color:white; padding:4px 10px; border-radius:5px; margin-right:40px;">
                        <strong>Experience</strong>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'contact' %}" 
                        style="color:#fd0d0d; background-color:white; padding:4px 10px; border-radius:5px; margin-right:40px;">
                        <strong>Contact</strong>
                        </a>
                    </li>
                </ul>
                <!-- Dark Mode Toggle -->
                <button id="theme-toggle" class="btn btn-outline-light ms-3" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <p class="mb-0">© 2026 Jagadeesan M | Built with Django, Python & Passion | 
            <a href="mailto:mjagadeesan113@gmail.com" class="text-white">mjagadeesan113@gmail.com</a>
        </p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AOS JS for animations -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>

    <!-- Dark Mode JS -->
    <script>
        const toggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        const icon = toggle.querySelector('i');

        toggle.addEventListener('click', () => {
            if (html.getAttribute('data-bs-theme') === 'dark') {
                html.setAttribute('data-bs-theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.setAttribute('data-bs-theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        });
    </script>

</body>
</html>
